<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Slicer – Backend (Simplified)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:#f5f6fa;color:#1e293b;min-height:100vh;}
  .header{text-align:center;padding:36px 20px 10px;}
  .header h1{font-size:24px;font-weight:700;color:#0f172a;}
  .header p{font-size:13px;color:#64748b;margin-top:5px;font-family:'JetBrains Mono',monospace;}
  .diagram{max-width:900px;margin:24px auto;padding:0 16px 48px;}
  svg{display:block;margin:0 auto;}
  .tooltip{position:fixed;background:#fff;border:1px solid #d0d5e0;border-radius:8px;padding:12px 16px;font-size:13px;line-height:1.55;color:#1e293b;max-width:380px;pointer-events:none;opacity:0;transition:opacity .12s;z-index:100;box-shadow:0 8px 28px rgba(0,0,0,0.12);}
  .tooltip.visible{opacity:1;}
  .tooltip strong{color:#0f172a;display:block;margin-bottom:4px;}
  .tooltip code{font-family:'JetBrains Mono',monospace;font-size:11px;background:#f5f6fa;padding:1px 5px;border-radius:3px;color:#2563eb;border:1px solid #d0d5e0;}
</style>
</head>
<body>
<div class="header">
  <h1>Data Slicer &mdash; Backend (Simplified)</h1>
  <p>FastAPI &middot; ClickHouse &middot; DuckDB &middot; PyPika</p>
</div>
<div class="diagram">
  <svg id="arch" width="860" height="680" viewBox="0 0 860 680"></svg>
</div>
<div class="tooltip" id="tip"></div>
<script>
const NS='http://www.w3.org/2000/svg', svg=document.getElementById('arch'), tip=document.getElementById('tip');
const C={blue:'#2563eb',green:'#16a34a',purple:'#9333ea',amber:'#d97706',pink:'#db2777',
  surface:'#ffffff',border:'#d0d5e0',text:'#1e293b',dim:'#64748b',line:'#94a3b8'};

const defs=document.createElementNS(NS,'defs');
const f=document.createElementNS(NS,'filter');
f.id='sh'; f.setAttribute('x','-4%'); f.setAttribute('y','-4%');
f.setAttribute('width','110%'); f.setAttribute('height','120%');
const fd=document.createElementNS(NS,'feDropShadow');
fd.setAttribute('dx','0'); fd.setAttribute('dy','2'); fd.setAttribute('stdDeviation','3');
fd.setAttribute('flood-color','rgba(0,0,0,0.07)');
f.appendChild(fd); defs.appendChild(f); svg.appendChild(defs);

const nodes=[
  {id:'main', x:310, y:14, w:240, h:50, color:C.blue, label:'FastAPI App (main.py)',
   desc:'Entry point. Mounts 6 routers (connection, metadata, query, relationships, snapshot, kaggle), CORS middleware, exception handlers, startup/shutdown.'},

  {id:'routers', x:310, y:100, w:240, h:50, color:C.blue, label:'API Routers (×6)',
   desc:'<b>connection</b> POST /connect, /disconnect<br><b>metadata</b> GET /databases, /tables, /columns<br><b>query</b> POST /query, /query-arrow<br><b>relationships</b> GET /table-relationships<br><b>snapshot</b> CRUD /snapshots<br><b>kaggle</b> GET /kaggle/search'},

  {id:'deps', x:620, y:100, w:220, h:50, color:C.pink, label:'Session State',
   desc:'<code>dependencies.py</code> — ConnectionStateManager keyed by session_id:tab_id. Provides get_active_connector, get_connection_details as FastAPI deps.'},

  {id:'services', x:20, y:200, w:260, h:50, color:C.green, label:'Services',
   desc:'<b>ConnectionService</b> — connect/disconnect orchestration<br><b>ValidationService</b> — field & DB validation<br><b>TableMergeService</b> — joins, virtual tables<br><b>SnapshotService</b> — config persistence<br><b>KaggleSearchService</b> — dataset search<br><b>CardinalityService</b> — distinct counts'},

  {id:'qexec', x:320, y:200, w:260, h:50, color:C.purple, label:'QueryExecutionService',
   desc:'Central orchestrator: parse QueryDescription → validate → translate to SQL → execute via connector → build QueryResult.'},

  {id:'qresult', x:620, y:200, w:220, h:50, color:C.purple, label:'QueryResultBuilder',
   desc:'Transforms raw connector output (columns + rows) into QueryResult with metadata, types, JS-safe numbers. Uses utils/type_conversion.'},

  {id:'qservice', x:80, y:310, w:260, h:50, color:C.purple, label:'QueryService (SQL Gen)',
   desc:'Translates QueryDescription → SQL via PyPika. Coordinates component builders: TableContext, Select, Filter, GroupBy, OrderBy, Optimization, Sampling.'},

  {id:'components', x:380, y:310, w:260, h:50, color:C.purple, label:'Query Components (×8)',
   desc:'<b>TableContextBuilder</b> — JOINs, UNIONs<br><b>SelectClauseBuilder</b> — dimensions, measures<br><b>FilterBuilder</b> — WHERE clause<br><b>GroupingOrderingBuilder</b> — GROUP BY, ORDER BY<br><b>OptimizationApplier</b> — strategy application<br><b>ResultBudgetApplier</b> — sampling, LIMIT<br><b>VirtualColumnBuilder</b> — computed fields<br><b>UnionQueryBuilder</b> — UNION queries'},

  {id:'optimizer', x:100, y:420, w:280, h:50, color:C.purple, label:'Optimization Engine',
   desc:'<b>QueryOptimizer</b> — coordinates pipeline<br><b>StrategyPlanner</b> — adaptive rounding, category dedup, datetime binning<br><b>SmallTableDetector</b> — skip for small tables<br><b>Estimators</b> — ClickHouseEstimator (system.parts), DuckDBEstimator (approx_count_distinct), BasicEstimator'},

  {id:'connreg', x:440, y:420, w:220, h:50, color:C.amber, label:'ConnectorRegistry',
   desc:'Factory: maps connection type → connector class. <code>create(type)</code> → BaseConnector subclass.'},

  {id:'connectors', x:200, y:530, w:460, h:55, color:C.amber, label:'Connectors: ClickHouse | File (DuckDB) | Kaggle | HiveParquet',
   desc:'All implement <b>BaseConnector</b> ABC: connect, disconnect, list_databases, list_tables, list_columns, fetch_data, fetch_data_arrow.<br><br><b>ClickHouseConnector</b> — clickhouse-connect, thread-safe, Arrow support<br><b>FileConnector</b> — in-memory DuckDB for CSV/Parquet<br><b>KaggleConnector</b> — download + DuckDB<br><b>HiveParquetConnector</b> — two-phase partition loading'},

  {id:'models', x:680, y:310, w:160, h:50, color:C.pink, label:'Models & Utils',
   desc:'<b>Pydantic models</b>: QueryDescription, QueryResult, ConnectionDetails, DataSource, Column, Filter, Measure, Dimension<br><br><b>Utils</b>: type_conversion (Decimal→float, JS-safe ints)<br><b>Exceptions</b>: AppException, DataSourceConnectionError, QueryExecutionError'},
];

const edges=[
  ['main','routers'],['main','deps'],
  ['routers','services'],['routers','qexec'],
  ['qexec','qresult'],['qexec','qservice'],['qexec','models'],
  ['qservice','components'],
  ['components','optimizer'],
  ['services','connreg'],
  ['optimizer','connreg'],
  ['connreg','connectors'],
  ['qresult','models'],
  ['deps','services'],
];

function el(tag,attrs){const e=document.createElementNS(NS,tag);for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);return e;}
function drawEdge(a,b){
  const n1=nodes.find(n=>n.id===a),n2=nodes.find(n=>n.id===b);if(!n1||!n2)return;
  const x1=n1.x+n1.w/2,y1=n1.y+n1.h,x2=n2.x+n2.w/2,y2=n2.y,my=(y1+y2)/2;
  svg.appendChild(el('path',{d:`M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`,fill:'none',stroke:C.line,'stroke-width':'1.6',opacity:'0.8',class:`edge e-${a} e-${b}`}));
}
function drawNode(n){
  const g=el('g',{style:'cursor:pointer'});
  const glow=el('rect',{x:n.x-3,y:n.y-3,width:n.w+6,height:n.h+6,rx:13,fill:n.color,opacity:'0',class:'glow'});
  g.appendChild(glow);
  g.appendChild(el('rect',{x:n.x,y:n.y,width:n.w,height:n.h,rx:10,fill:C.surface,stroke:n.color,'stroke-width':'1.6',filter:'url(#sh)'}));
  g.appendChild(el('rect',{x:n.x,y:n.y,width:5,height:n.h,rx:2,fill:n.color}));
  const t=el('text',{x:n.x+n.w/2,y:n.y+n.h/2+1,fill:C.text,'font-size':'13','font-family':"'DM Sans',sans-serif",'font-weight':'600','text-anchor':'middle','dominant-baseline':'middle'});
  t.textContent=n.label;
  g.appendChild(t);
  g.addEventListener('mouseenter',e=>{glow.setAttribute('opacity','0.14');hl(n.id,true);showTip(e,n);});
  g.addEventListener('mousemove',e=>moveTip(e));
  g.addEventListener('mouseleave',()=>{glow.setAttribute('opacity','0');hl(n.id,false);hideTip();});
  svg.appendChild(g);
}
function hl(id,on){svg.querySelectorAll(`.e-${id}`).forEach(p=>{p.setAttribute('opacity',on?'1':'0.8');p.setAttribute('stroke-width',on?'2.6':'1.6');p.setAttribute('stroke',on?C.blue:C.line);});}

edges.forEach(([a,b])=>drawEdge(a,b));
nodes.forEach(n=>drawNode(n));

// Flow
const fg=el('g',{});
fg.appendChild(el('rect',{x:30,y:618,width:800,height:48,rx:10,fill:'#eef1f8',stroke:C.border,'stroke-width':'1'}));
const ft=el('text',{x:430,y:638,fill:C.dim,'font-size':'12','font-family':"'JetBrains Mono',monospace",'text-anchor':'middle'});
ft.textContent='POST /query → Router → QueryExecutionService → QueryService (SQL) → Connector → QueryResultBuilder → JSON';
fg.appendChild(ft);
const ft2=el('text',{x:430,y:656,fill:C.dim,'font-size':'11','font-family':"'JetBrains Mono',monospace",'text-anchor':'middle',opacity:'0.6'});
ft2.textContent='POST /connect → Router → ConnectionService → ConnectorRegistry → Connector.connect() → SessionState';
fg.appendChild(ft2);
svg.appendChild(fg);

function showTip(e,n){tip.innerHTML=`<strong>${n.label}</strong>${n.desc}`;tip.classList.add('visible');moveTip(e);}
function moveTip(e){let x=e.clientX+14,y=e.clientY+14;if(x+390>window.innerWidth)x=e.clientX-400;if(y+180>window.innerHeight)y=e.clientY-190;tip.style.left=x+'px';tip.style.top=y+'px';}
function hideTip(){tip.classList.remove('visible');}
</script>
</body>
</html>
