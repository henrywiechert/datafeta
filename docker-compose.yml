version: '3.9'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: data-slicer:${APP_VERSION:-latest}
    container_name: ${CONTAINER_NAME:-data-slicer-app}
    environment:
      - LOG_LEVEL=info
      - PORT=8000  # internal container port, always safe — host port is HOST_PORT
      - PYTHONUNBUFFERED=1
      - REACT_APP_API_BASE=/api/v1
      - SNAPSHOT_STORAGE_DIR=/app/data/snapshots
      - APP_MODE=${APP_MODE:-standard}
      - SNAPSHOT_MODE=${SNAPSHOT_MODE:-}
      - CURATED_SNAPSHOT_DIR=${CURATED_SNAPSHOT_DIR:-/app/data/snapshots}
      - DEBUG_API_ENABLED=${DEBUG_API_ENABLED:-}
      - DEBUG_UI_ENABLED=${DEBUG_UI_ENABLED:-}
      - CONNECTOR_ALLOWLIST=${CONNECTOR_ALLOWLIST:-}
      - DEMO_DATASETS_ENABLED=${DEMO_DATASETS_ENABLED:-}
      - DEMO_DATASETS_JSON=${DEMO_DATASETS_JSON:-}
      - DEMO_CLICKHOUSE_HOST=${DEMO_CLICKHOUSE_HOST:-}
      - DEMO_CLICKHOUSE_PORT=${DEMO_CLICKHOUSE_PORT:-8123}
      - DEMO_CLICKHOUSE_USER=${DEMO_CLICKHOUSE_USER:-default}
      - DEMO_CLICKHOUSE_PASSWORD=${DEMO_CLICKHOUSE_PASSWORD:-}
    ports:
      - "${HOST_PORT:-8100}:8000"
    volumes:
      # Persistent storage for saved snapshots/configurations
      - ${SNAPSHOT_DIR:-./data/snapshots}:/app/data/snapshots
    # For development you might want to mount source code:
    # volumes:
    #   - ./backend:/app/backend
    #   - ./frontend:/app/frontend
    #   - ./frontend/build:/app/backend/static
    # command: python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload --h11-max-incomplete-event-size 131072

