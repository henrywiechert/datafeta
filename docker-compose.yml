version: '3.9'
services:
  app:
    build: .
    container_name: data-slicer-app
    environment:
      - LOG_LEVEL=info
      - PORT=8000
      - PYTHONUNBUFFERED=1
      - REACT_APP_API_BASE=/api/v1
    ports:
      - "8000:8000"
    # For development you might want to mount source code:
    # volumes:
    #   - ./backend:/app/backend
    #   - ./frontend:/app/frontend
    #   - ./frontend/build:/app/backend/static
    # command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload

