<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Slicer – Frontend (Simplified)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:#f5f6fa;color:#1e293b;min-height:100vh;}
  .header{text-align:center;padding:36px 20px 10px;}
  .header h1{font-size:24px;font-weight:700;color:#0f172a;}
  .header p{font-size:13px;color:#64748b;margin-top:5px;font-family:'JetBrains Mono',monospace;}
  .diagram{max-width:960px;margin:24px auto;padding:0 16px 48px;}
  svg{display:block;margin:0 auto;}
  .tooltip{position:fixed;background:#fff;border:1px solid #d0d5e0;border-radius:8px;padding:12px 16px;font-size:13px;line-height:1.55;color:#1e293b;max-width:380px;pointer-events:none;opacity:0;transition:opacity .12s;z-index:100;box-shadow:0 8px 28px rgba(0,0,0,0.12);}
  .tooltip.visible{opacity:1;}
  .tooltip strong{color:#0f172a;display:block;margin-bottom:4px;}
  .tooltip code{font-family:'JetBrains Mono',monospace;font-size:11px;background:#f5f6fa;padding:1px 5px;border-radius:3px;color:#2563eb;border:1px solid #d0d5e0;}
</style>
</head>
<body>
<div class="header">
  <h1>Data Slicer &mdash; Frontend (Simplified)</h1>
  <p>React 18 &middot; TypeScript &middot; MUI &middot; Observable Plot &middot; Zustand &middot; DuckDB WASM</p>
</div>
<div class="diagram">
  <svg id="arch" width="920" height="760" viewBox="0 0 920 760"></svg>
</div>
<div class="tooltip" id="tip"></div>
<script>
const NS='http://www.w3.org/2000/svg', svg=document.getElementById('arch'), tip=document.getElementById('tip');
const C={blue:'#2563eb',green:'#16a34a',cyan:'#0891b2',purple:'#9333ea',amber:'#d97706',slate:'#64748b',
  surface:'#ffffff',border:'#d0d5e0',text:'#1e293b',dim:'#64748b',line:'#94a3b8'};

const defs=document.createElementNS(NS,'defs');
const f=document.createElementNS(NS,'filter');
f.id='sh'; f.setAttribute('x','-4%'); f.setAttribute('y','-4%');
f.setAttribute('width','110%'); f.setAttribute('height','120%');
const fd=document.createElementNS(NS,'feDropShadow');
fd.setAttribute('dx','0'); fd.setAttribute('dy','2'); fd.setAttribute('stdDeviation','3');
fd.setAttribute('flood-color','rgba(0,0,0,0.07)');
f.appendChild(fd); defs.appendChild(f); svg.appendChild(defs);

const nodes=[
  // Row 0 – Entry
  {id:'entry', x:330, y:14, w:260, h:50, color:C.blue, label:'index.tsx → App.tsx',
   desc:'React entry + BrowserRouter. Provider tree: DataSourceProvider → VisualizationProvider → ConnectionProvider → App. Routes: / → DataSourceSelectionPage, /visualize → VisualizationPage.'},

  // Row 1 – State
  {id:'contexts', x:60, y:100, w:280, h:50, color:C.blue, label:'Contexts (×5)',
   desc:'<b>DataSourceContext</b> — tables, fields, virtual columns, session filters<br><b>ConnectionContext</b> — connect/disconnect lifecycle<br><b>SheetContext</b> — multi-sheet workspace<br><b>VisualizationContext</b> — per-sheet axes, filters, encodings, results<br><b>UndoRedoContext</b> — per-sheet undo/redo stacks'},
  {id:'stores', x:380, y:100, w:210, h:50, color:C.blue, label:'Zustand Stores (×2)',
   desc:'<b>sheetRenderCacheStore</b> — caches queryResult + chartSpec per sheet for instant tab switching<br><b>selectionStore</b> — multi-select for fields (shift-click, range)'},
  {id:'shared', x:630, y:100, w:250, h:50, color:C.slate, label:'types/ · utils/ · config/',
   desc:'<b>types/</b> — Field, QueryDescription, Filter, Connection, Sheet, VirtualColumn<br><b>utils/</b> — fieldUtils, filterActions, syntheticFields, sheetConfigHash, tabSession<br><b>config/</b> — colorSchemes, loadingConfig'},

  // Row 2 – Pages (two lanes start here)
  {id:'pg_ds', x:30, y:200, w:250, h:50, color:C.green, label:'DataSourceSelectionPage',
   desc:'Connection selection. Shows forms for CSV, ClickHouse, Kaggle, Hive Parquet. Connect/disconnect, config import.'},
  {id:'pg_viz', x:340, y:200, w:250, h:50, color:C.green, label:'VisualizationPage',
   desc:'Main workspace. Resizable panels: FieldsPanel, ChartArea, FilterPanel, Overrides, Color, Legend, TableView. Per-sheet providers.'},

  // Left lane – Connection
  {id:'forms', x:30, y:295, w:250, h:50, color:C.green, label:'Connection Forms (×4)',
   desc:'<b>CsvConnectionForm</b> — CSV/Parquet file upload<br><b>ClickHouseConnectionForm</b> — host, port, DB, credentials<br><b>KaggleConnectionForm</b> — dataset search & import<br><b>HiveParquetConnectionForm</b> — two-phase path + partition'},
  {id:'api_conn', x:30, y:390, w:250, h:48, color:C.amber, label:'connectionApi · kaggleApi',
   desc:'<b>connectionApi</b> — connect, disconnect, connectHive, loadPartition, addFiles<br><b>kaggleApi</b> — searchKaggleDatasets, listKaggleFiles'},

  // Right lane – Viz panels
  {id:'panels', x:340, y:295, w:290, h:50, color:C.green, label:'UI Panels (×7)',
   desc:'<b>FieldsPanel</b> — field search, table list, drag-to-axis<br><b>ChartArea</b> — chart viewport, controls, debug<br><b>FilterPanel</b> — discrete/continuous filters<br><b>FieldOverridesPanel</b> — chart type, color, size<br><b>ColorPanel</b> — scheme selector<br><b>LegendPanel</b> — chart legend<br><b>TableView</b> — AG Grid with lazy loading'},
  {id:'extra', x:670, y:295, w:220, h:50, color:C.green, label:'VirtualColumns · SaveLoad',
   desc:'<b>VirtualColumnManager</b> — create/edit virtual columns, binning<br><b>SaveLoadMenu</b> — export/import config, snapshot gallery, connection restore'},

  // Row 4 – Hooks
  {id:'hooks_viz', x:340, y:395, w:290, h:48, color:C.cyan, label:'Visualization Hooks',
   desc:'<b>useVisualizationState</b> — aggregates all state<br><b>useDragDrop</b> — field drag to encoding channels<br><b>useGlobalFilters</b> — session vs sheet filters<br><b>useUndoRedo</b> — state undo/redo<br><b>useMetadataOperations</b> — fetch DBs, tables, columns<br><b>useRenderingCoordinator</b> — plot lifecycle'},
  {id:'hooks_q', x:340, y:488, w:290, h:48, color:C.cyan, label:'useQueryExecution · useQueryBuilder',
   desc:'<b>useQueryExecution</b> — coordinates build → execute → result, triggers on state changes<br><b>useQueryBuilder</b> — builds QueryDescription from axes, filters, encodings'},

  // Row 5 – Query & Chart gen
  {id:'qbuilder', x:160, y:580, w:210, h:50, color:C.purple, label:'queryBuilder/',
   desc:'Converts visualization state into QueryDescription. Handles measures, dimensions, filters, virtual columns, optimization hints.'},
  {id:'plotgen', x:410, y:580, w:240, h:50, color:C.purple, label:'observable-plot-generator/',
   desc:'Chart generation on @observablehq/plot. Chart types: line, bar, scatter, cell, gantt, tick. Faceting, grid, colors, tooltips, labels.'},
  {id:'renderer', x:690, y:580, w:190, h:50, color:C.purple, label:'ChartRenderer',
   desc:'Renders Observable Plot output into DOM. MultiPlotGrid for faceted charts. Resize handling.'},

  // Row 6 – API & local execution
  {id:'api_q', x:80, y:680, w:190, h:50, color:C.amber, label:'queryApi',
   desc:'executeQuery (JSON), executeQueryArrow (Arrow IPC). Sends QueryDescription to backend, receives QueryResult.'},
  {id:'api_support', x:680, y:488, w:200, h:48, color:C.amber, label:'metadataApi · snapshotApi',
   desc:'<b>metadataApi</b> — listDatabases, listTables, listColumns, getFieldStats, getDistinctValues<br><b>snapshotApi</b> — CRUD for saved configurations'},
  {id:'local', x:310, y:680, w:340, h:50, color:C.amber, label:'Local Execution (DuckDB WASM)',
   desc:'<b>queryExecutionOrchestrator</b> — local vs remote decision<br><b>queryDecisionEngine</b> — picks execution path<br><b>localSqlBuilder</b> — builds SQL for DuckDB<br><b>duckdbService</b> — in-browser DuckDB WASM<br><b>arrowResultAdapter</b> — Arrow IPC → rows'},
  {id:'api_client', x:690, y:680, w:190, h:50, color:C.amber, label:'apiClient (HTTP base)',
   desc:'Base HTTP client used by all API modules. API_BASE URL, AbortController for cancellation, X-Tab-Id header.'},
];

const edges=[
  ['entry','contexts'],['entry','stores'],
  ['entry','pg_ds'],['entry','pg_viz'],
  ['contexts','pg_ds'],['contexts','pg_viz'],
  ['pg_ds','forms'],
  ['forms','api_conn'],
  ['pg_viz','panels'],['pg_viz','extra'],
  ['panels','hooks_viz'],
  ['hooks_viz','hooks_q'],
  ['hooks_q','qbuilder'],['hooks_q','plotgen'],
  ['hooks_q','api_q'],['hooks_q','local'],
  ['plotgen','renderer'],
  ['hooks_viz','api_support'],
  ['extra','api_support'],
  ['api_conn','api_client'],['api_q','api_client'],['api_support','api_client'],
  ['local','api_q'],
  ['stores','hooks_viz'],
  ['qbuilder','api_q'],
];

function el(tag,attrs){const e=document.createElementNS(NS,tag);for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);return e;}
function drawEdge(a,b){
  const n1=nodes.find(n=>n.id===a),n2=nodes.find(n=>n.id===b);if(!n1||!n2)return;
  const x1=n1.x+n1.w/2,y1=n1.y+n1.h,x2=n2.x+n2.w/2,y2=n2.y,my=(y1+y2)/2;
  svg.appendChild(el('path',{d:`M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`,fill:'none',stroke:C.line,'stroke-width':'1.6',opacity:'0.8',class:`edge e-${a} e-${b}`}));
}
function drawNode(n){
  const g=el('g',{style:'cursor:pointer'});
  const glow=el('rect',{x:n.x-3,y:n.y-3,width:n.w+6,height:n.h+6,rx:13,fill:n.color,opacity:'0',class:'glow'});
  g.appendChild(glow);
  g.appendChild(el('rect',{x:n.x,y:n.y,width:n.w,height:n.h,rx:10,fill:C.surface,stroke:n.color,'stroke-width':'1.6',filter:'url(#sh)'}));
  g.appendChild(el('rect',{x:n.x,y:n.y,width:5,height:n.h,rx:2,fill:n.color}));
  const t=el('text',{x:n.x+n.w/2,y:n.y+n.h/2+1,fill:C.text,'font-size':'13','font-family':"'DM Sans',sans-serif",'font-weight':'600','text-anchor':'middle','dominant-baseline':'middle'});
  t.textContent=n.label;
  g.appendChild(t);
  g.addEventListener('mouseenter',e=>{glow.setAttribute('opacity','0.14');hl(n.id,true);showTip(e,n);});
  g.addEventListener('mousemove',e=>moveTip(e));
  g.addEventListener('mouseleave',()=>{glow.setAttribute('opacity','0');hl(n.id,false);hideTip();});
  svg.appendChild(g);
}
function hl(id,on){svg.querySelectorAll(`.e-${id}`).forEach(p=>{p.setAttribute('opacity',on?'1':'0.8');p.setAttribute('stroke-width',on?'2.6':'1.6');p.setAttribute('stroke',on?C.blue:C.line);});}

// Swim-lane hints
function lane(x,y,w,h,label){
  svg.appendChild(el('rect',{x,y,width:w,height:h,rx:12,fill:'#ebeef5',opacity:'0.45'}));
  const t=el('text',{x:x+w/2,y:y+15,fill:C.dim,'font-size':'10','font-family':"'JetBrains Mono',monospace",'font-weight':'600','text-anchor':'middle','letter-spacing':'1',opacity:'0.55'});
  t.textContent=label;
  svg.appendChild(t);
}
lane(15, 178, 280, 280, 'CONNECTION');
lane(325, 178, 310, 375, 'VISUALIZATION & QUERY');

edges.forEach(([a,b])=>drawEdge(a,b));
nodes.forEach(n=>drawNode(n));

function showTip(e,n){tip.innerHTML=`<strong>${n.label}</strong>${n.desc}`;tip.classList.add('visible');moveTip(e);}
function moveTip(e){let x=e.clientX+14,y=e.clientY+14;if(x+390>window.innerWidth)x=e.clientX-400;if(y+180>window.innerHeight)y=e.clientY-190;tip.style.left=x+'px';tip.style.top=y+'px';}
function hideTip(){tip.classList.remove('visible');}
</script>
</body>
</html>
