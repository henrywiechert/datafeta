name: Deploy

# Triggered manually or on a nightly schedule.
# 1. Runs the full test suite (reuses test.yml via workflow_call).
# 2. Generates version files, builds the Docker image, pushes to GHCR.
# 3. SSHes into the VPS and runs deploy-app.sh with the new image SHA.
#
# Required GitHub Secrets:
#   VPS_HOST      VPS IP or hostname
#   VPS_USER      deploy
#   VPS_SSH_KEY   contents of ~/.ssh/datafeta_deploy (private key)
#
# GITHUB_TOKEN is used automatically for GHCR push (no extra secret needed).
# The GHCR package must be set to Public so the VPS can pull without auth.

on:
  workflow_dispatch:  # manual trigger from GitHub Actions UI
  schedule:
    - cron: '0 2 * * *'  # nightly at 02:00 UTC

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build-and-deploy:
    name: Build image and deploy
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git describe in version scripts

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate version files
        run: |
          (cd frontend && node scripts/generate-version.js)
          python3 backend/scripts/generate_version.py

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/henrywiechert/data-slicer:${{ github.sha }}
            ghcr.io/henrywiechert/data-slicer:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            git -C /opt/datafeta-infra pull --ff-only
            /opt/datafeta-infra/scripts/deploy-app.sh ${{ github.sha }}
