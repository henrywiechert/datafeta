version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      backend-python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      frontend-core-stack:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
          - "@types/react"
          - "@types/react-dom"
          - "typescript"
          - "react-scripts"
      frontend-ui-stack:
        patterns:
          - "@mui/*"
          - "@emotion/*"
          - "@observablehq/plot"
          - "ag-grid-*"
          - "zustand"
          - "react-resizable-panels"
          - "react-window"
      frontend-other-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
          - "@types/react"
          - "@types/react-dom"
          - "typescript"
          - "react-scripts"
          - "@mui/*"
          - "@emotion/*"
          - "@observablehq/plot"
          - "ag-grid-*"
          - "zustand"
          - "react-resizable-panels"
          - "react-window"
