<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Backend Architecture Overview – datafeta</title>
  <style>
    :root {
      --bg: #060c1a;
      --ink: #e4eeff;
      --muted: #7b93b8;
      --c-core: #5aaeff;
      --c-domain: #4dd9a0;
      --c-data: #ffc84a;
      --c-cross: #b87eff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      background: radial-gradient(ellipse 120% 60% at 15% 0%, #162a50 0%, transparent 55%),
                  radial-gradient(ellipse 100% 50% at 85% 100%, #22113a 0%, transparent 55%),
                  var(--bg);
      color: var(--ink);
    }
    .wrap { max-width: 1480px; margin: 0 auto; padding: 28px 20px 40px; }
    header { margin-bottom: 22px; }
    h1 { margin: 0 0 6px; font-size: 1.8rem; font-weight: 700; letter-spacing: -.2px; }
    .sub { margin: 0; color: var(--muted); font-size: .95rem; }
    .card {
      background: linear-gradient(165deg, #0e1d3a 0%, #07101f 100%);
      border: 1px solid #1c2e52;
      border-radius: 18px;
      padding: 20px 18px;
      overflow-x: auto;
      box-shadow: 0 24px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04);
    }
    .legend {
      margin-top: 14px; display: flex; gap: 20px; flex-wrap: wrap;
      font-size: .88rem; color: var(--muted);
    }
    .leg { display: flex; align-items: center; gap: 7px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; }
    .dot-c { background: var(--c-core); }
    .dot-d { background: var(--c-domain); }
    .dot-s { background: var(--c-data); }
    .dot-x { background: var(--c-cross); }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Backend architecture overview</h1>
    <p class="sub">Request ingress → runtime orchestration → processing &amp; execution → data sources</p>
  </header>

  <div class="card">

        J  QueryPipe→Optim        M644 526 L706 526           (inline, row 3)
