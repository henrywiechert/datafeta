<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Backend Data Source Architecture</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2e;
      --ink: #e6edf7;
      --muted: #a8b3c7;
      --line: #4c5b78;
      --accent: #5ab0ff;
      --good: #61d095;
      --warn: #ffd166;
    }
    body {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background: radial-gradient(1200px 700px at 20% 0%, #152340 0%, var(--bg) 55%);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
    }
    .card {
      background: var(--panel);
      border: 1px solid #1f2c48;
      border-radius: 14px;
      padding: 16px;
      overflow: auto;
    }
    svg text {
      font-size: 12px;
      fill: var(--ink);
    }
    .muted { fill: var(--muted); }
    .node {
      fill: #172643;
      stroke: var(--line);
      stroke-width: 1.2;
      rx: 10;
    }
    .node-main { stroke: var(--accent); }
    .node-plugin { stroke: var(--good); }
    .node-data { stroke: var(--warn); }
    .legend {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.92rem;
    }
    code {
      color: #9fd4ff;
      background: #0f1c34;
      padding: 1px 5px;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Backend data source + plugin architecture</h1>
    <p>
      Connection flow centered on <code>ConnectionService</code>, with connector behavior driven by
      <code>ConnectorRegistry</code> and <code>ConnectorSpec</code>.
    </p>

    <div class="card">
      <svg width="1120" height="740" viewBox="0 0 1120 740" role="img" aria-label="Backend data source architecture diagram">
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#7e90b4"></path>
          </marker>
        </defs>

        <!-- Top: API surface -->
        <rect class="node node-main" x="40" y="30" width="240" height="130"></rect>
        <text x="56" y="56">API Router</text>
        <text class="muted" x="56" y="76">backend/routers/connection.py</text>
        <text x="56" y="102">POST /connect</text>
        <text x="56" y="120">POST /connect/json</text>
        <text x="56" y="138">GET /connectors</text>

        <rect class="node" x="320" y="30" width="220" height="130"></rect>
        <text x="338" y="56">Session State</text>
        <text class="muted" x="338" y="76">ConnectionStateManager</text>
        <text x="338" y="102">current_connector</text>
        <text x="338" y="120">current_connection_details</text>
        <text x="338" y="138">current_temp_paths</text>

        <rect class="node node-main" x="580" y="30" width="260" height="130"></rect>
        <text x="598" y="56">ConnectionService</text>
        <text class="muted" x="598" y="76">backend/services/connection_service.py</text>
        <text x="598" y="102">connect_json / connect_multipart</text>
        <text x="598" y="120">add_files / connect_hive / disconnect</text>

        <line x1="280" y1="95" x2="320" y2="95" stroke="#7e90b4" stroke-width="1.5" marker-end="url(#arrow)"></line>
        <line x1="540" y1="95" x2="580" y2="95" stroke="#7e90b4" stroke-width="1.5" marker-end="url(#arrow)"></line>

        <!-- Middle: plugin architecture -->
        <rect class="node node-plugin" x="70" y="220" width="320" height="180"></rect>
        <text x="90" y="246">ConnectorRegistry</text>
        <text class="muted" x="90" y="266">backend/connectors/registry.py</text>
        <text x="90" y="292">register(ConnectorSpec)</text>
        <text x="90" y="310">get_spec(type) / create(type)</text>
        <text x="90" y="336">Registered connectors:</text>
        <text x="110" y="354">clickhouse, csv, kaggle, hive_parquet</text>
        <text x="90" y="378">GET /connectors -> capabilities + config schema</text>

        <rect class="node node-plugin" x="430" y="220" width="360" height="180"></rect>
        <text x="450" y="246">ConnectorSpec + Capabilities</text>
        <text class="muted" x="450" y="266">backend/connectors/spec.py</text>
        <text x="450" y="292">id, display_name, dialect, config_model</text>
        <text x="450" y="310">factory, build_connect_args</text>
        <text x="450" y="328">build_multipart_connect_args</text>
        <text x="450" y="352">supports_json_connect</text>
        <text x="450" y="370">supports_multipart_connect</text>
        <text x="450" y="388">supports_incremental_file_add</text>

        <line x1="710" y1="160" x2="710" y2="220" stroke="#7e90b4" stroke-width="1.5" marker-end="url(#arrow)"></line>
        <line x1="390" y1="310" x2="430" y2="310" stroke="#7e90b4" stroke-width="1.5" marker-end="url(#arrow)"></line>

        <!-- Bottom: runtime connector side -->
        <rect class="node" x="70" y="470" width="230" height="180"></rect>
        <text x="88" y="496">BaseConnector</text>
        <text class="muted" x="88" y="516">abstract interface</text>
        <text x="88" y="542">connect / disconnect</text>
        <text x="88" y="560">list_tables / list_columns</text>
        <text x="88" y="578">fetch_data / fetch_data_arrow</text>
        <text x="88" y="596">sql_dialect property</text>

        <rect class="node node-plugin" x="330" y="470" width="310" height="180"></rect>
        <text x="348" y="496">Connector Implementations</text>
        <text class="muted" x="348" y="516">backend/connectors/*.py</text>
        <text x="348" y="542">ClickHouseConnector</text>
        <text x="348" y="560">FileConnector (CSV/Parquet)</text>
        <text x="348" y="578">KaggleConnector</text>
        <text x="348" y="596">HiveParquetConnector</text>

        <rect class="node" x="670" y="470" width="180" height="180"></rect>
        <text x="688" y="496">SQL Dialects</text>
        <text class="muted" x="688" y="516">backend/dialects/*</text>
        <text x="688" y="542">ClickHouseDialect</text>
        <text x="688" y="560">DuckDbDialect</text>
        <text x="688" y="586">Used by query stack</text>
        <text x="688" y="604">and estimators</text>

        <rect class="node node-data" x="880" y="470" width="200" height="180"></rect>
        <text x="900" y="496">Data Sources</text>
        <text class="muted" x="900" y="516">runtime backends</text>
        <text x="900" y="542">ClickHouse DB</text>
        <text x="900" y="560">Uploaded CSV/Parquet</text>
        <text x="900" y="578">Kaggle datasets</text>
        <text x="900" y="596">Hive partitions</text>

        <line x1="250" y1="400" x2="250" y2="470" stroke="#7e90b4" stroke-width="1.5" marker-end="url(#arrow)"></line>
        <line x1="560" y1="400" x2="500" y2="470" stroke="#7e90b4" stroke-width="1.5" marker-end="url(#arrow)"></line>
        <line x1="300" y1="560" x2="330" y2="560" stroke="#7e90b4" stroke-width="1.5" marker-end="url(#arrow)"></line>
        <line x1="640" y1="560" x2="670" y2="560" stroke="#7e90b4" stroke-width="1.5" marker-end="url(#arrow)"></line>
        <line x1="850" y1="560" x2="880" y2="560" stroke="#7e90b4" stroke-width="1.5" marker-end="url(#arrow)"></line>

        <!-- Key flow labels -->
        <text class="muted" x="705" y="196">resolve spec, validate config, gate by capabilities</text>
        <text class="muted" x="470" y="438">factory -> connector instance</text>
      </svg>
    </div>

    <div class="legend">
      <strong>Legend:</strong> blue border = orchestration layer, green border = plugin contracts/implementations,
      yellow border = external data systems.
    </div>
  </div>
</body>
</html>
