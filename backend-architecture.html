<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Slicer – Backend Architecture</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --surface2: #ffffff;
    --border: #d0d5e0;
    --accent: #2563eb;
    --accent2: #d97706;
    --accent3: #16a34a;
    --accent4: #9333ea;
    --accent5: #db2777;
    --text: #1e293b;
    --text-dim: #64748b;
    --text-bright: #0f172a;
    --line: #94a3b8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: auto;
  }

  .header {
    text-align: center;
    padding: 36px 20px 14px;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: -0.5px;
  }
  .header p {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  .legend {
    display: flex;
    justify-content: center;
    gap: 22px;
    padding: 10px 20px 24px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 3px;
  }

  .diagram {
    width: 100%;
    max-width: 1360px;
    margin: 0 auto;
    padding: 0 20px 50px;
  }

  svg { display: block; margin: 0 auto; }

  .tooltip {
    position: fixed;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
    max-width: 350px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .tooltip.visible { opacity: 1; }
  .tooltip strong { color: var(--text-bright); display: block; margin-bottom: 4px; }
  .tooltip code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--bg);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--accent);
    border: 1px solid var(--border);
  }
</style>
</head>
<body>

<div class="header">
  <h1>Data Slicer &mdash; Backend Architecture</h1>
  <p>FastAPI &middot; ClickHouse &middot; DuckDB &middot; PyPika</p>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Entry &amp; API Routers</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent3)"></div> Services</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent4)"></div> Query Pipeline</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent2)"></div> Connectors &amp; Data Sources</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent5)"></div> Infrastructure</div>
</div>

<div class="diagram">
  <svg id="arch" width="1320" height="1080" viewBox="0 0 1320 1080"></svg>
</div>

<div class="tooltip" id="tip"></div>

<script>
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('arch');
const tip  = document.getElementById('tip');

const C = {
  accent:  '#2563eb',
  accent2: '#d97706',
  accent3: '#16a34a',
  accent4: '#9333ea',
  accent5: '#db2777',
  surface: '#ffffff',
  border:  '#d0d5e0',
  text:    '#1e293b',
  dim:     '#64748b',
  line:    '#94a3b8',
  bg:      '#f5f6fa',
};

// SVG shadow filter for node cards
const defs = document.createElementNS(NS, 'defs');
const filter = document.createElementNS(NS, 'filter');
filter.setAttribute('id', 'shadow');
filter.setAttribute('x', '-4%');
filter.setAttribute('y', '-4%');
filter.setAttribute('width', '110%');
filter.setAttribute('height', '120%');
const feOff = document.createElementNS(NS, 'feDropShadow');
feOff.setAttribute('dx', '0');
feOff.setAttribute('dy', '2');
feOff.setAttribute('stdDeviation', '3');
feOff.setAttribute('flood-color', 'rgba(0,0,0,0.08)');
filter.appendChild(feOff);
defs.appendChild(filter);
svg.appendChild(defs);

/* ── NODE DATA ── */
const nodes = [
  // Row 0 – Entry
  { id:'main', x:480, y:16, w:200, h:50, label:'main.py (FastAPI)', color:C.accent,
    desc:'App entry point. Mounts routers, CORS middleware, exception handlers, startup/shutdown lifecycle.' },

  // Row 1 – Routers
  { id:'r_conn',   x:15,  y:110, w:170, h:46, label:'connection router',    color:C.accent,
    desc:'Connect/disconnect endpoints. File uploads (multipart), JSON connect, Hive Parquet two-phase flow.<br><code>POST /connect, /disconnect</code>' },
  { id:'r_meta',   x:205, y:110, w:148, h:46, label:'metadata router',      color:C.accent,
    desc:'List databases, tables, columns from the active connector.<br><code>GET /databases, /tables, /columns</code>' },
  { id:'r_query',  x:373, y:110, w:148, h:46, label:'query router',         color:C.accent,
    desc:'Execute queries (JSON / Arrow IPC), row count, distinct count.<br><code>POST /query, /query-arrow, /row-count</code>' },
  { id:'r_rel',    x:541, y:110, w:176, h:46, label:'relationships router',  color:C.accent,
    desc:'Foreign key detection, suggested joins, merged columns.<br><code>GET /table-relationships, /suggested-joins</code>' },
  { id:'r_snap',   x:737, y:110, w:148, h:46, label:'snapshot router',      color:C.accent,
    desc:'Snapshot CRUD – save/load query configurations to file-based JSON.<br><code>GET/POST /snapshots</code>' },
  { id:'r_kaggle', x:905, y:110, w:148, h:46, label:'kaggle router',        color:C.accent,
    desc:'Search Kaggle datasets, list files for import.<br><code>GET /kaggle/search, /kaggle/files</code>' },

  // Row 2 – Dependencies
  { id:'deps', x:410, y:200, w:340, h:44, label:'dependencies.py  (Session State)', color:C.accent5,
    desc:'<strong>ConnectionStateManager</strong> – per-session state keyed by session_id:tab_id. Provides FastAPI deps: <code>get_state_manager</code>, <code>get_active_connector</code>, <code>get_connection_details</code>.' },

  // Row 3 – Services
  { id:'s_conn',   x:15,  y:296, w:175, h:46, label:'ConnectionService',    color:C.accent3,
    desc:'Orchestrates connect/disconnect. Parses ConnectionDetails, saves uploads, creates connector via ConnectorRegistry, sets session state.' },
  { id:'s_valid',  x:210, y:296, w:165, h:46, label:'ValidationService',    color:C.accent3,
    desc:'Validates ClickHouse DB existence, CSV table names, and query fields before execution.' },
  { id:'s_merge',  x:395, y:296, w:170, h:46, label:'TableMergeService',    color:C.accent3,
    desc:'Builds virtual tables from suggested joins. Detects foreign keys, computes merged columns for multi-table queries.' },
  { id:'s_snap',   x:585, y:296, w:155, h:46, label:'SnapshotService',      color:C.accent3,
    desc:'File-based JSON storage for saved query configurations. CRUD operations.' },
  { id:'s_kaggle', x:760, y:296, w:180, h:46, label:'KaggleSearchService',  color:C.accent3,
    desc:'Wraps Kaggle API – search datasets, list files, trigger download for import.' },
  { id:'s_card',   x:960, y:296, w:175, h:46, label:'CardinalityService',   color:C.accent3,
    desc:'Computes distinct counts for columns – used by UI for filter dropdowns and optimization hints.' },

  // Row 4 – Query Execution
  { id:'qe',  x:310, y:400, w:260, h:50, label:'QueryExecutionService',     color:C.accent4,
    desc:'<strong>Orchestrator</strong>: parse → validate → translate → execute → build result. The central query pipeline coordinator.' },
  { id:'qrb', x:610, y:400, w:210, h:50, label:'QueryResultBuilder',        color:C.accent4,
    desc:'Transforms raw connector output (columns + rows) into <code>QueryResult</code> with metadata, types, and JS-safe numbers.' },

  // Row 5 – Query Translation
  { id:'qs', x:80,  y:500, w:250, h:50, label:'QueryService (SQL Gen)',     color:C.accent4,
    desc:'Translates <code>QueryDescription</code> → SQL via PyPika. Coordinates all query component builders.' },
  { id:'dt', x:360, y:500, w:180, h:50, label:'DateTimeService',            color:C.accent4,
    desc:'Datetime extraction and truncation per DB engine (ClickHouse vs DuckDB). Generates EXTRACT / DATE_TRUNC.' },
  { id:'fc', x:570, y:500, w:220, h:50, label:'FilterConversionService',    color:C.accent4,
    desc:'Converts frontend filter configuration (UI format) into internal <code>Filter</code> objects for SQL generation.' },

  // Row 6 – Query Components
  { id:'qc_table',  x:15,  y:604, w:160, h:42, label:'TableContextBuilder',    color:C.accent4,
    desc:'Builds PyPika table context – handles JOINs, UNIONs, virtual tables, aliases.' },
  { id:'qc_select', x:190, y:604, w:158, h:42, label:'SelectClauseBuilder',    color:C.accent4,
    desc:'SELECT clause: dimensions, measures (SUM, AVG, COUNT…), virtual column expressions, aliases.' },
  { id:'qc_filter', x:363, y:604, w:128, h:42, label:'FilterBuilder',          color:C.accent4,
    desc:'WHERE clause from Filter objects. Operators: eq, ne, gt, lt, in, between, like, is_null, etc.' },
  { id:'qc_group',  x:506, y:604, w:196, h:42, label:'GroupingOrderingBuilder', color:C.accent4,
    desc:'GROUP BY and ORDER BY clause generation. Handles dimension grouping and multi-column ordering.' },
  { id:'qc_opt',    x:717, y:604, w:196, h:42, label:'OptimizationApplier',     color:C.accent4,
    desc:'Applies optimization strategies to the query: adaptive rounding, category dedup, datetime binning.' },
  { id:'qc_budget', x:928, y:604, w:192, h:42, label:'ResultBudgetApplier',     color:C.accent4,
    desc:'Sampling and LIMIT to keep results within budget. TABLESAMPLE for ClickHouse, row limits for DuckDB.' },

  // Row 7 – Optimization engine
  { id:'optimizer', x:50,  y:710, w:220, h:50, label:'QueryOptimizer',               color:C.accent4,
    desc:'Coordinates the optimization pipeline: config → detect small tables → plan strategies → estimate cardinality → select best plan.' },
  { id:'planner',   x:300, y:710, w:200, h:50, label:'StrategyPlanner',              color:C.accent4,
    desc:'Builds optimization strategies from hints or query structure. Selects among adaptive rounding, category dedup, datetime binning.' },
  { id:'detect',    x:530, y:710, w:200, h:50, label:'SmallTableDetector',           color:C.accent4,
    desc:'Checks if table row count is below threshold. Skips optimization for small tables to avoid overhead.' },
  { id:'est',       x:760, y:710, w:230, h:50, label:'Estimators (CH / Duck / Basic)', color:C.accent4,
    desc:'Cardinality estimators per engine.<br><strong>ClickHouseEstimator</strong>: system.parts + uniqExact.<br><strong>DuckDBEstimator</strong>: approx_count_distinct.<br><strong>BasicEstimator</strong>: fallback.' },

  // Row 8 – Connectors
  { id:'c_reg',    x:380, y:840, w:220, h:46, label:'ConnectorRegistry',       color:C.accent2,
    desc:'Factory that maps connection type strings to connector classes. <code>create(type)</code> → BaseConnector subclass.' },
  { id:'c_ch',     x:15,  y:920, w:185, h:50, label:'ClickHouseConnector',     color:C.accent2,
    desc:'Wraps <code>clickhouse-connect</code> Client. Thread-safe with lock. Detects FKs via system tables. Supports Arrow.' },
  { id:'c_file',   x:225, y:920, w:180, h:50, label:'FileConnector (DuckDB)',  color:C.accent2,
    desc:'In-memory DuckDB for CSV/Parquet files. File handlers for validation and schema inference. Per-session temp files.' },
  { id:'c_kaggle', x:430, y:920, w:180, h:50, label:'KaggleConnector',         color:C.accent2,
    desc:'Downloads Kaggle datasets, then loads into DuckDB. Extends FileConnector pattern.' },
  { id:'c_hive',   x:635, y:920, w:200, h:50, label:'HiveParquetConnector',    color:C.accent2,
    desc:'Two-phase: (1) connect to discover partitions, (2) load selected partition. Uses DuckDB backend.' },
  { id:'c_base',   x:860, y:920, w:185, h:50, label:'BaseConnector (ABC)',     color:C.accent2,
    desc:'Abstract base class. Interface: <code>connect, disconnect, list_databases, list_tables, list_columns, fetch_data, fetch_data_arrow</code>.' },

  // Infra sidebar
  { id:'models',     x:980, y:400, w:158, h:44, label:'Models (Pydantic)',  color:C.accent5,
    desc:'<code>QueryDescription</code>, <code>QueryResult</code>, <code>ConnectionDetails</code>, <code>DataSource</code>, <code>Column</code>, <code>Filter</code>, <code>Measure</code>, <code>Dimension</code>, etc.' },
  { id:'utils',      x:980, y:460, w:158, h:44, label:'Utils',              color:C.accent5,
    desc:'<code>type_conversion</code>: Decimal→float, NaN/Inf→None, JS-safe integer checks. Used by QueryResultBuilder.' },
  { id:'exceptions', x:980, y:520, w:158, h:44, label:'Exceptions',         color:C.accent5,
    desc:'<code>AppException</code>, <code>DataSourceConnectionError</code>, <code>QueryExecutionError</code>. Mapped to HTTP status codes by main.py handlers.' },
];

/* ── EDGES ── */
const edges = [
  // main → routers
  ['main','r_conn'],['main','r_meta'],['main','r_query'],['main','r_rel'],['main','r_snap'],['main','r_kaggle'],
  // routers → deps
  ['r_conn','deps'],['r_meta','deps'],['r_query','deps'],['r_rel','deps'],
  // routers → services
  ['r_conn','s_conn'],['r_meta','s_valid'],['r_query','qe'],['r_rel','s_merge'],['r_snap','s_snap'],['r_kaggle','s_kaggle'],
  ['r_query','s_card'],['r_query','fc'],
  // query execution pipeline
  ['qe','qs'],['qe','s_valid'],['qe','qrb'],
  ['qs','dt'],['qs','qc_table'],['qs','qc_select'],['qs','qc_filter'],['qs','qc_group'],['qs','qc_opt'],['qs','qc_budget'],
  // optimization
  ['qc_opt','optimizer'],
  ['optimizer','planner'],['optimizer','detect'],['optimizer','est'],
  // connectors
  ['s_conn','c_reg'],
  ['c_reg','c_ch'],['c_reg','c_file'],['c_reg','c_kaggle'],['c_reg','c_hive'],
  ['c_ch','c_base'],['c_file','c_base'],['c_kaggle','c_base'],['c_hive','c_base'],
  // cross
  ['qrb','utils'],['qe','models'],
  ['deps','s_conn'],
];

/* ── DRAW HELPERS ── */
function el(tag, attrs) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function center(n) { return { x: n.x + n.w/2, y: n.y + n.h/2 }; }

function drawEdge(a, b) {
  const n1 = nodes.find(n => n.id === a);
  const n2 = nodes.find(n => n.id === b);
  if (!n1 || !n2) return;

  const x1 = n1.x + n1.w/2, y1 = n1.y + n1.h;
  const x2 = n2.x + n2.w/2, y2 = n2.y;

  const my = (y1 + y2) / 2;
  svg.appendChild(el('path', {
    d: `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`,
    fill: 'none',
    stroke: C.line,
    'stroke-width': '1.5',
    'stroke-dasharray': '5,3',
    opacity: '0.8',
    class: `edge e-${a} e-${b}`,
  }));
}

function drawNode(n) {
  const g = el('g', { class:'node', 'data-id':n.id, style:'cursor:pointer' });

  const glow = el('rect', {
    x:n.x-3, y:n.y-3, width:n.w+6, height:n.h+6, rx:13,
    fill:n.color, opacity:'0', class:'glow'
  });
  g.appendChild(glow);

  g.appendChild(el('rect', {
    x:n.x, y:n.y, width:n.w, height:n.h, rx:10,
    fill:C.surface, stroke:n.color, 'stroke-width':'1.6',
    filter:'url(#shadow)',
  }));

  g.appendChild(el('rect', {
    x:n.x, y:n.y, width:4, height:n.h, rx:2, fill:n.color,
  }));

  const txt = el('text', {
    x:n.x+n.w/2, y:n.y+n.h/2+1,
    fill:C.text, 'font-size':'12.5', 'font-family':"'DM Sans',sans-serif",
    'font-weight':'500', 'text-anchor':'middle', 'dominant-baseline':'middle',
  });
  txt.textContent = n.label;
  g.appendChild(txt);

  g.addEventListener('mouseenter', e => {
    glow.setAttribute('opacity','0.14');
    highlightEdges(n.id, true);
    showTip(e, n);
  });
  g.addEventListener('mousemove', e => moveTip(e));
  g.addEventListener('mouseleave', () => {
    glow.setAttribute('opacity','0');
    highlightEdges(n.id, false);
    hideTip();
  });

  svg.appendChild(g);
}

function highlightEdges(id, on) {
  svg.querySelectorAll(`.e-${id}`).forEach(p => {
    p.setAttribute('opacity', on ? '1' : '0.8');
    p.setAttribute('stroke-width', on ? '2.5' : '1.5');
    p.setAttribute('stroke', on ? C.accent : C.line);
  });
}

/* ── SECTION LABELS ── */
function drawSectionLabel(x, y, text) {
  const t = el('text', {
    x, y, fill:C.dim, 'font-size':'11', 'font-family':"'JetBrains Mono',monospace",
    'font-weight':'500', 'text-anchor':'end', opacity:'0.6',
  });
  t.textContent = text;
  svg.appendChild(t);
}

/* ── TOOLTIP ── */
function showTip(e, n) {
  tip.innerHTML = `<strong>${n.label}</strong>${n.desc}`;
  tip.classList.add('visible');
  moveTip(e);
}
function moveTip(e) {
  let tx = e.clientX + 14, ty = e.clientY + 14;
  if (tx + 360 > window.innerWidth)  tx = e.clientX - 370;
  if (ty + 200 > window.innerHeight) ty = e.clientY - 210;
  tip.style.left = tx+'px';
  tip.style.top  = ty+'px';
}
function hideTip() { tip.classList.remove('visible'); }

/* ── RENDER ── */

// Horizontal separator lines
[90, 185, 275, 382, 482, 585, 694, 820, 1000].forEach(y => {
  svg.appendChild(el('line', {
    x1:10, y1:y, x2:1310, y2:y,
    stroke:C.border, 'stroke-width':'0.8', 'stroke-dasharray':'2,4', opacity:'0.6',
  }));
});

edges.forEach(([a,b]) => drawEdge(a,b));
nodes.forEach(n => drawNode(n));

// Section labels – drawn AFTER nodes so they are never covered
drawSectionLabel(1305, 30,  'ENTRY POINT');
drawSectionLabel(1305, 120, 'API ROUTERS');
drawSectionLabel(1305, 214, 'SESSION STATE');
drawSectionLabel(1305, 310, 'SERVICES');
drawSectionLabel(1305, 420, 'QUERY EXECUTION');
drawSectionLabel(1305, 515, 'SQL TRANSLATION');
drawSectionLabel(1305, 620, 'QUERY COMPONENTS');
drawSectionLabel(1305, 730, 'OPTIMIZATION');
drawSectionLabel(1305, 860, 'CONNECTORS');

/* ── DATA FLOW CALLOUT ── */
const flowG = el('g', {});
const flowBg = el('rect', {
  x:15, y:1010, width:1290, height:55, rx:10,
  fill:'#eef1f8', stroke:C.border, 'stroke-width':'1',
});
flowG.appendChild(flowBg);
const flowTxt = el('text', {
  x:660, y:1034,
  fill:C.dim, 'font-size':'12', 'font-family':"'JetBrains Mono',monospace",
  'font-weight':'400', 'text-anchor':'middle',
});
flowTxt.textContent = 'DATA FLOW:  POST /query  →  Router  →  QueryExecutionService  →  validate  →  QueryService (SQL)  →  Connector.fetch_data  →  QueryResultBuilder  →  JSON';
flowG.appendChild(flowTxt);
const flowTxt2 = el('text', {
  x:660, y:1052,
  fill:C.dim, 'font-size':'11', 'font-family':"'JetBrains Mono',monospace",
  'font-weight':'400', 'text-anchor':'middle', opacity:'0.6',
});
flowTxt2.textContent = 'POST /connect  →  Router  →  ConnectionService  →  ConnectorRegistry.create(type)  →  connector.connect()  →  StateManager.set_state()';
flowG.appendChild(flowTxt2);
svg.appendChild(flowG);
</script>
</body>
</html>
