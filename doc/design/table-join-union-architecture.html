<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Join / Union Architecture (High Level)</title>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #334155;
      --line: #cbd5e1;
      --blue: #dbeafe;
      --green: #dcfce7;
      --purple: #ede9fe;
      --yellow: #fef3c7;
      --active: #1d4ed8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .sub {
      margin: 0 0 16px;
      color: var(--muted);
    }

    .panel, .note {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
    }

    .panel {
      overflow-x: auto;
    }

    svg {
      width: 100%;
      min-width: 980px;
      height: auto;
      display: block;
    }

    .node-link {
      cursor: pointer;
      text-decoration: none;
    }

    .node-link rect {
      stroke: #64748b;
      stroke-width: 1.2;
      rx: 12;
      ry: 12;
      transition: all 0.15s ease;
    }

    .node-link:hover rect {
      stroke: var(--active);
      stroke-width: 2;
    }

    .label {
      font-size: 14px;
      font-weight: 700;
    }

    .small {
      font-size: 12px;
      fill: #334155;
    }

    .arrow {
      stroke: #64748b;
      stroke-width: 1.5;
      fill: none;
      marker-end: url(#a);
    }

    .tip {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Join / Union Architecture</h1>
    <p class="sub">High-level overview. Click any main block to open a dedicated mid/low-level design page.</p>

    <div class="panel">
      <svg viewBox="0 0 980 680" role="img" aria-label="High-level flow with clickable blocks">
        <defs>
          <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"></polygon>
          </marker>
        </defs>

        <a class="node-link" href="table-join-union-detail-ui.html">
          <rect x="300" y="24" width="380" height="78" fill="var(--blue)"></rect>
          <text x="318" y="52" class="label">1) User config in UI</text>
          <text x="318" y="74" class="small">choose tables -> create `virtual_table`</text>
          <text x="318" y="90" class="small">(mode = join or union)</text>
        </a>

        <a class="node-link" href="table-join-union-detail-api.html">
          <rect x="300" y="146" width="380" height="78" fill="var(--purple)"></rect>
          <text x="318" y="174" class="label">2) API request</text>
          <text x="318" y="196" class="small">`POST /api/v1/data/query` with `QueryDescription`</text>
        </a>

        <path class="arrow" d="M490 102 L490 146"></path>

        <polygon points="490,260 590,320 490,380 390,320" fill="#eef2ff" stroke="#64748b" stroke-width="1.2"></polygon>
        <text x="444" y="316" class="label">mode?</text>
        <text x="428" y="334" class="small">join / union</text>
        <path class="arrow" d="M490 224 L490 260"></path>

        <a class="node-link" href="table-join-union-detail-join.html">
          <rect x="60" y="430" width="360" height="94" fill="var(--green)"></rect>
          <text x="78" y="458" class="label">3A) JOIN path</text>
          <text x="78" y="480" class="small">`TableContextBuilder` builds JOIN graph</text>
          <text x="78" y="498" class="small">`QueryService` builds joined SQL</text>
        </a>

        <a class="node-link" href="table-join-union-detail-union.html">
          <rect x="560" y="430" width="360" height="94" fill="var(--green)"></rect>
          <text x="578" y="458" class="label">3B) UNION path</text>
          <text x="578" y="480" class="small">`UnionQueryBuilder` creates per-table SQL</text>
          <text x="578" y="498" class="small">aligns schema -> `UNION ALL`</text>
        </a>

        <path class="arrow" d="M418 349 L260 430"></path>
        <text x="382" y="368" class="small">join</text>
        <path class="arrow" d="M562 349 L740 430"></path>
        <text x="566" y="368" class="small">union</text>

        <a class="node-link" href="table-join-union-detail-execution.html">
          <rect x="260" y="566" width="460" height="90" fill="var(--yellow)"></rect>
          <text x="278" y="594" class="label">4) Execute SQL via connector</text>
          <text x="278" y="616" class="small">ClickHouse / DuckDB runs SQL and returns rows</text>
          <text x="278" y="634" class="small">frontend renders charts</text>
        </a>

        <path class="arrow" d="M240 524 L420 566"></path>
        <path class="arrow" d="M740 524 L560 566"></path>
      </svg>
      <p class="tip">Tip: each block opens its own design page so we can evolve details independently.</p>
    </div>
    <div class="note" style="margin-top: 14px;">
      Pages:
      <a href="table-join-union-detail-ui.html">UI</a> ·
      <a href="table-join-union-detail-api.html">API</a> ·
      <a href="table-join-union-detail-join.html">JOIN</a> ·
      <a href="table-join-union-detail-union.html">UNION</a> ·
      <a href="table-join-union-detail-execution.html">Execution</a>
    </div>
  </div>
</body>
</html>
