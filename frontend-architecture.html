<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Slicer – Frontend Architecture (Flow)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --surface2: #ffffff;
    --border: #d0d5e0;
    --accent: #2563eb;
    --accent2: #d97706;
    --accent3: #16a34a;
    --accent4: #9333ea;
    --accent5: #db2777;
    --accent6: #0891b2;
    --text: #1e293b;
    --text-dim: #64748b;
    --text-bright: #0f172a;
    --line: #94a3b8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'DM Sans',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    overflow-x:auto;
  }
  .header { text-align:center; padding:36px 20px 14px; }
  .header h1 { font-size:26px; font-weight:700; color:var(--text-bright); letter-spacing:-0.5px; }
  .header p { font-size:13px; color:var(--text-dim); margin-top:6px; font-family:'JetBrains Mono',monospace; }
  .legend { display:flex; justify-content:center; gap:22px; padding:10px 20px 24px; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--text-dim); }
  .legend-dot { width:10px; height:10px; border-radius:3px; }
  .diagram { width:100%; max-width:1400px; margin:0 auto; padding:0 20px 50px; }
  svg { display:block; margin:0 auto; }
  .tooltip {
    position:fixed; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:12px 16px; font-size:13px; line-height:1.55;
    color:var(--text); max-width:360px; pointer-events:none; opacity:0;
    transition:opacity 0.12s; z-index:100; box-shadow:0 8px 32px rgba(0,0,0,0.12);
  }
  .tooltip.visible { opacity:1; }
  .tooltip strong { color:var(--text-bright); display:block; margin-bottom:4px; }
  .tooltip code {
    font-family:'JetBrains Mono',monospace; font-size:11px;
    background:var(--bg); padding:1px 5px; border-radius:3px;
    color:var(--accent); border:1px solid var(--border);
  }
</style>
</head>
<body>

<div class="header">
  <h1>Data Slicer &mdash; Frontend Architecture</h1>
  <p>React 18 &middot; TypeScript &middot; MUI &middot; Observable Plot &middot; Zustand &middot; DuckDB WASM</p>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Entry &amp; Routing</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent5)"></div> State (Contexts &amp; Stores)</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent3)"></div> Pages &amp; Layout</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent6)"></div> Hooks</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent4)"></div> Components</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent2)"></div> Services &amp; API</div>
</div>

<div class="diagram">
  <svg id="arch" width="1360" height="1220" viewBox="0 0 1360 1220"></svg>
</div>

<div class="tooltip" id="tip"></div>

<script>
const NS='http://www.w3.org/2000/svg';
const svg=document.getElementById('arch');
const tip=document.getElementById('tip');

// Shadow filter
const defs=document.createElementNS(NS,'defs');
const filter=document.createElementNS(NS,'filter');
filter.setAttribute('id','shadow'); filter.setAttribute('x','-4%'); filter.setAttribute('y','-4%');
filter.setAttribute('width','110%'); filter.setAttribute('height','120%');
const feDrop=document.createElementNS(NS,'feDropShadow');
feDrop.setAttribute('dx','0'); feDrop.setAttribute('dy','2');
feDrop.setAttribute('stdDeviation','3'); feDrop.setAttribute('flood-color','rgba(0,0,0,0.08)');
filter.appendChild(feDrop); defs.appendChild(filter); svg.appendChild(defs);

const nodes=[
  // Row 0 – Entry

const edges=[

  ['index','ctx_ds'],['index','ctx_conn'],['index','ctx_viz'],
  // entry → app
  ['index','app'],
  // app → pages
  ['app','pg_ds'],['app','pg_viz'],['app','layout'],
  // contexts → pages

  ['pg_ds','f_csv'],['pg_ds','f_ch'],['pg_ds','f_kag'],['pg_ds','f_hive'],
  // pages → viz panels
  ['pg_viz','fields'],['pg_viz','chart'],['pg_viz','filter'],['pg_viz','overrides'],['pg_viz','color'],['pg_viz','legend'],['pg_viz','table'],
  // chart internals
  ['chart','renderer'],['chart','grid'],
  // viz panels → hooks
  ['fields','h_vizst'],['fields','h_drag'],
  ['chart','h_qexec'],['chart','h_qbuild'],
  ['filter','h_gfilt'],
  ['pg_viz','h_undo'],['pg_viz','h_meta'],
  // hooks → query/chart gen
  ['h_qbuild','qbuilder'],['h_qexec','plotgen'],['h_qexec','optHint'],
  // hooks → api
  ['h_qexec','api_q'],['h_meta','api_meta'],

  ['f_csv','api_conn'],['f_ch','api_conn'],['f_kag','api_kag'],['f_hive','api_conn'],

  ['api_conn','api_client'],['api_meta','api_client'],['api_q','api_client'],['api_snap','api_client'],['api_kag','api_client'],

  ['decision','localsql'],['localsql','duckdb'],

  // cache
  ['h_qexec','z_cache'],
  // saveload
  ['saveload','api_snap'],['saveload','config'],
];

function el(tag,attrs){
  const e=document.createElementNS(NS,tag);
  for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);
  return e;
}

function drawEdge(a,b){
  const n1=nodes.find(n=>n.id===a), n2=nodes.find(n=>n.id===b);
  if(!n1||!n2)return;
  const x1=n1.x+n1.w/2, y1=n1.y+n1.h;
  const x2=n2.x+n2.w/2, y2=n2.y;
  const my=(y1+y2)/2;
  svg.appendChild(el('path',{
    d:`M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`,
    fill:'none', stroke:C.line, 'stroke-width':'1.5',
    'stroke-dasharray':'5,3', opacity:'0.8',
    class:`edge e-${a} e-${b}`,
  }));
}

function drawNode(n){
  const g=el('g',{class:'node','data-id':n.id,style:'cursor:pointer'});
  const glow=el('rect',{x:n.x-3,y:n.y-3,width:n.w+6,height:n.h+6,rx:13,fill:n.color,opacity:'0',class:'glow'});
  g.appendChild(glow);
  g.appendChild(el('rect',{x:n.x,y:n.y,width:n.w,height:n.h,rx:10,fill:C.surface,stroke:n.color,'stroke-width':'1.6',filter:'url(#shadow)'}));
  g.appendChild(el('rect',{x:n.x,y:n.y,width:4,height:n.h,rx:2,fill:n.color}));
  const txt=el('text',{x:n.x+n.w/2,y:n.y+n.h/2+1,fill:C.text,'font-size':'12.5','font-family':"'DM Sans',sans-serif",'font-weight':'500','text-anchor':'middle','dominant-baseline':'middle'});
  txt.textContent=n.label;
  g.appendChild(txt);
  g.addEventListener('mouseenter',e=>{glow.setAttribute('opacity','0.14');highlightEdges(n.id,true);showTip(e,n);});
  g.addEventListener('mousemove',e=>moveTip(e));
  g.addEventListener('mouseleave',()=>{glow.setAttribute('opacity','0');highlightEdges(n.id,false);hideTip();});
  svg.appendChild(g);
}

function highlightEdges(id,on){
  svg.querySelectorAll(`.e-${id}`).forEach(p=>{
    p.setAttribute('opacity',on?'1':'0.8');
    p.setAttribute('stroke-width',on?'2.5':'1.5');
    p.setAttribute('stroke',on?C.accent:C.line);
  });
}

function drawSectionLabel(x,y,text){
  const t=el('text',{x,y,fill:C.dim,'font-size':'11','font-family':"'JetBrains Mono',monospace",'font-weight':'500','text-anchor':'end',opacity:'0.7'});
  t.textContent=text;
  svg.appendChild(t);
}

// Separators
[90,188,280,385,540,640,740,855,955,1050].forEach(y=>{
  svg.appendChild(el('line',{x1:10,y1:y,x2:1350,y2:y,stroke:C.border,'stroke-width':'0.8','stroke-dasharray':'2,4',opacity:'0.6'}));
});

edges.forEach(([a,b])=>drawEdge(a,b));
nodes.forEach(n=>drawNode(n));

drawSectionLabel(1345,30,'ENTRY POINT');
drawSectionLabel(1345,122,'STATE (CONTEXTS + STORES)');

drawSectionLabel(1345,775,'QUERY & CHART GEN');
drawSectionLabel(1345,885,'API SERVICES');

const fG=el('g',{});

ft1.textContent='QUERY FLOW:  UI Panel → useQueryBuilder → QueryDescription → queryApi.executeQuery → Backend → QueryResult → observablePlotGenerator → ChartRenderer';
fG.appendChild(ft1);
const ft2=el('text',{x:680,y:1100,fill:C.dim,'font-size':'11','font-family':"'JetBrains Mono',monospace",'font-weight':'400','text-anchor':'middle',opacity:'0.7'});
ft2.textContent='LOCAL PATH:  useQueryExecution → queryExecutionOrchestrator → queryDecisionEngine → localSqlBuilder → DuckDB WASM → arrowResultAdapter';
